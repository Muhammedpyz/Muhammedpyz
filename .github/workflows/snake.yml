name: snake

on:
  schedule:
    - cron: "0 3 * * *"   # daily, 03:00 UTC
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  snake:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: Platane/snk@v3
        id: snake
        with:
          github_user_name: Muhammedpyz
          outputs: |
            assets/snake.svg
            assets/snake-dark.svg?palette=github-dark
            assets/snake-light.svg?palette=github-light

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(assets): refresh contribution snake"
          file_pattern: assets/snake*.svg
